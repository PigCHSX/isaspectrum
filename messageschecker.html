<!DOCTYPE html>
<html lang="zh-CN">
<head>

body{background:#fff;display:grid;place-items:center;height:100vh}

.domain{color:#666;font-size:16px}

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

(async function() {

        // 检查是否为审核员

            setTimeout(function() { location.href = 'checker-pending.html'; }, 2200);
            return;
        }
    }
    setTimeout(function() { location.href = 'login-messageschecker.html'; }, 2200);
})();
