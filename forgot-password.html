<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>找回密码 - ISA Spectrum</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        .login-box h2 { text-align: center; margin-bottom: 8px; color: #1e50ae; font-size: 24px; }
        .login-box .sub { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        .login-box input { width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; transition: border-color 0.2s; }
        .login-box input:focus { outline: none; border-color: #1e50ae; }
        .login-btn { width: 100%; padding: 14px; background: #1e50ae; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-btn:hover { background: #15408f; }
        .login-btn:disabled { background: #999; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #1e50ae; text-decoration: none; font-size: 14px; }
        .error-msg { color: #dc3545; text-align: center; font-size: 13px; margin-top: 8px; display: none; }
    </style>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ISA Spectrum" />
    <link rel="manifest" href="/images/site.webmanifest" />
</head>
<body>
    <div class="login-box">
        <h2>找回密码</h2>
        <p class="sub">请输入注册邮箱，我们会发送密码重置链接</p>
        <input id="email" placeholder="邮箱" type="email">
        <button class="login-btn" id="resetBtn">发送重置邮件</button>
        <p class="error-msg" id="errorMsg"></p>
        <a href="login.html" class="back-link">返回登录</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://urecpftjcruwfcdwrcyj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_yLWqUQuZbmcsUwE5hwTv2A_wGe1mU0_';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('resetBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';
            
            if (!email) {
                errorMsg.textContent = '请输入邮箱';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '发送中...';

            const { error } = await supabase.auth.resetPasswordForEmail(email);
            
            btn.disabled = false;
            btn.textContent = '发送重置邮件';

            if (error) {
                errorMsg.textContent = '发送失败：' + error.message;
                errorMsg.style.display = 'block';
            } else {
                alert('重置邮件已发送，请前往邮箱查收！');
                location.href = 'login.html';
            }
        }

        document.getElementById('resetBtn').addEventListener('click', resetPassword);
        document.addEventListener('keydown', e => e.key === 'Enter' && resetPassword());
    </script>
</body>
</html>
