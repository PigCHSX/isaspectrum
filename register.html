<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 - ISA Spectrum</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        .login-box h2 { text-align: center; margin-bottom: 8px; color: #1e50ae; font-size: 24px; }
        .login-box .sub { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        .login-box input { width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; transition: border-color 0.2s; }
        .login-box input:focus { outline: none; border-color: #1e50ae; }
        .login-btn { width: 100%; padding: 14px; background: #1e50ae; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-btn:hover { background: #15408f; }
        .login-btn:disabled { background: #999; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 10px; color: #1e50ae; text-decoration: none; font-size: 14px; }
        .error-msg { color: #dc3545; text-align: center; font-size: 13px; margin-top: 8px; display: none; }
        #accountTips { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:999; }
        .tipsContent { background:white; padding:25px; border-radius:16px; max-width:320px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.12); }
        .closeTips { margin-top:15px; padding:8px 20px; background:#1e50ae; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
        .closeTips:hover { background:#15408f; }
    </style>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ISA Spectrum" />
    <link rel="manifest" href="/images/site.webmanifest" />
</head>
<body>
    <div id="accountTips">
        <div class="tipsContent">
            <p>注册后会发送验证邮件，请前往邮箱激活后再登录！</p>
            <button class="closeTips" onclick="closeTips()">我知道了</button>
        </div>
    </div>

    <div class="login-box">
        <h2>账号注册</h2>
        <p class="sub">创建您的 ISA Spectrum 账号</p>
        <input id="username" placeholder="设置用户名" type="text">
        <input id="email" placeholder="邮箱" type="email">
        <input id="password" placeholder="设置密码" type="password">
        <button class="login-btn" id="registerBtn">完成注册</button>
        <p class="error-msg" id="errorMsg"></p>
        <a href="login.html" class="back-link">返回登录</a>
        <a href="main.html" class="back-link">返回首页</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://bbcnrsktqarvceekrswb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_f3Kav8ipJco_f9tw5zO50A_w7KigE5D';
        
        if (!window.supabase) {
            alert('Supabase 加载失败，请检查网络！');
        }
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = () => document.getElementById('accountTips').style.display = 'flex';
        function closeTips() { document.getElementById('accountTips').style.display = 'none'; }

        window.doRegister = async function() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';

            if (!username || !email || !password) {
                errorMsg.textContent = '请填写完整信息';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const { error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { username } }
                });
                
                if (error) throw error;
                
                alert('注册成功！请前往邮箱查收验证邮件，激活后登录。');
                location.href = 'login.html';
            } catch (err) {
                errorMsg.textContent = '注册失败：' + err.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '完成注册';
            }
        };

        document.getElementById('registerBtn').addEventListener('click', window.doRegister);
        document.addEventListener('keydown', e => e.key === 'Enter' && window.doRegister());
    </script>
</body>
</html>
