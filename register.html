<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 - ISA Spectrum</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
        .nav{background:#fff;padding:22px 0;text-align:center;box-shadow:0 2px 10px #00000007;}
        .nav a{margin:0 14px;font-size:16px;color:#222;text-decoration:none;padding:8px 10px}
        .nav a.active{color:#007bff;font-weight:600}
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin: 40px auto; }
        .box h2 { text-align: center; margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #409eff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #337ecc; }
        .link { text-align: center; margin-top: 15px; }
        .link a { color: #409eff; text-decoration: none; margin: 0 5px; }
        #accountTips { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:999; }
        .tipsContent { background:white; padding:25px; border-radius:10px; max-width:320px; text-align:center; }
        .closeTips { margin-top:15px; padding:8px 20px; background:#409eff; color:white; border:none; border-radius:5px; cursor:pointer; }
    </style>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ISA Spectrum" />
    <link rel="manifest" href="/images/site.webmanifest" />
</head>
<body>
<div id="accountTips">
    <div class="tipsContent">
        <p>注册后会发送验证邮件，请前往邮箱激活后再登录！</p>
        <button class="closeTips" onclick="closeTips()">我知道了</button>
    </div>
</div>

<div class="box">
    <h2>账号注册</h2>
    <input id="username" placeholder="设置用户名" type="text">
    <input id="email" placeholder="邮箱" type="email">
    <input id="password" placeholder="设置密码" type="password">
    <button id="registerBtn">完成注册</button>
    <div class="link">
        <a href="login.html">返回登录</a> | <a href="main.html">返回首页</a>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://bbcnrsktqarvceekrswb.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_f3Kav8ipJco_f9tw5zO50A_w7KigE5D';
if (!window.supabase) alert('Supabase 加载失败，请检查网络！');
window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

window.onload = () => document.getElementById('accountTips').style.display = 'flex';
function closeTips() { document.getElementById('accountTips').style.display = 'none'; }

window.doRegister = async function() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !email || !password) { alert('请填写完整信息！'); return; }
    try {
        const { error } = await window.supabaseClient.auth.signUp({
            email, password,
            options: { data: { username } }
        });
        if (error) throw error;
        alert('注册成功！请前往邮箱查收验证邮件，激活后登录。');
        location.href = 'login.html';
    } catch (err) {
        alert('注册失败：' + err.message);
    }
};
document.getElementById('registerBtn').addEventListener('click', window.doRegister);
</script>
</body>
</html>
