<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待审核 - ISA Spectrum</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        :root { --theme-color: #1e50ae; --footer-bg: #262626; --footer-text: #7b7b7b; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#f0f2f5;color:#333;padding-top:60px}
        .header{position:fixed;top:0;left:0;width:100%;background:#1e50ae;z-index:1000;height:60px}
        .nav-container{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;height:60px}
        .logo{display:flex;align-items:center;text-decoration:none;color:#fff;font-size:18px;font-weight:bold}
        .logo img{height:36px;margin-right:10px}
        .nav-links{display:flex;list-style:none}
        .nav-links li{margin-left:24px}
        .nav-links a{text-decoration:none;color:rgba(255,255,255,0.85);font-size:15px;padding:8px 12px;border-radius:6px;transition:all 0.2s}
        .nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,0.15)}
        .menu-toggle{display:none;background:none;border:none;font-size:26px;cursor:pointer;color:#fff}
        .main-content{max-width:1200px;margin:40px auto;padding:0 20px}
        .page-title{text-align:center;font-size:28px;color:var(--theme-color);margin-bottom:30px}
        .logout-bar{display:flex;justify-content:flex-end;margin-bottom:20px}
        .logout-btn{background:#dc3545;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}
        .item{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        .item-header{display:flex;justify-content:space-between;margin-bottom:12px}
        .item-user{font-weight:600;color:var(--theme-color)}
        .item-time{font-size:12px;color:#999}
        .item-content{line-height:1.8;margin-bottom:12px;white-space:pre-line}
        .item-email{font-size:13px;color:#888;margin-bottom:16px}
        .message-images{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
        .message-image{width:150px;height:150px;object-fit:cover;border-radius:8px;cursor:pointer}
        .item-actions{display:flex;gap:12px}
        .btn-approve{background:#28a745;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
        .btn-reject{background:#dc3545;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
        .empty{text-align:center;padding:60px 0;color:#999}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;justify-content:center;align-items:center}
        .modal-box{background:#fff;border-radius:16px;padding:30px;width:90%;max-width:450px}
        .modal-box h3{margin-bottom:16px;color:#dc3545}
        .modal-box textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;min-height:100px;resize:vertical}
        .modal-actions{display:flex;gap:12px;margin-top:16px;justify-content:flex-end}
        .modal-actions button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px}
        .btn-cancel{background:#eee;color:#333}
        .btn-confirm{background:#dc3545;color:#fff}
        @media(max-width:768px){
            .nav-links{display:none;flex-direction:column;width:100%;background:#1e50ae;position:absolute;top:60px;left:0;padding:10px 0}
            .nav-links.show{display:flex}
            .nav-links li{margin:0;text-align:center}
            .menu-toggle{display:block}
            .message-image{width:100px;height:100px}
        }
    </style>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ISA Spectrum" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="messageschecker.html" class="logo"><img src="./images/logo.png" alt="Logo"><span>ISA Spectrum 审核</span></a>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navList">
                <li><a href="checker-pending.html" class="active">待审核</a></li>
                <li><a href="checker-approved.html">已发布</a></li>
                <li><a href="checker-deleted.html">已删除</a></li>
            </ul>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">待审核留言</h1>
        <div class="logout-bar"><button class="logout-btn" onclick="doLogout()">退出登录</button></div>
        <div id="list"></div>
    </main>

    <div class="modal-overlay" id="rejectModal">
        <div class="modal-box">
            <h3>拒绝原因</h3>
            <p style="color:#666;font-size:13px;margin-bottom:12px">此原因将以匿名方式发送给发布者，同时实名发送给管理员。</p>
            <textarea id="rejectReason" placeholder="请填写拒绝原因..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeRejectModal()">取消</button>
                <button class="btn-confirm" id="confirmRejectBtn">确认拒绝</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bbcnrsktqarvceekrswb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiY25yc2t0cWFydmNlZWtyc3diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjUxODYsImV4cCI6MjA5NTEwMTE4Nn0.Mu6GW91z1HW2iX-tbQgH5qXrvpG2SPc9QoqCxGvV-54';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 邮件服务公钥
        const MAIN_PUBLIC_KEY = 'uahvFOAFb1xRmqK6F';
        const SUB_PUBLIC_KEY = 'pESVSeXQr0aep4iGL';
        let currentChecker = null;
        let pendingRejectId = null;

        // 初始化 emailjs（基础配置）
        emailjs.init({
            publicKey: MAIN_PUBLIC_KEY, // 默认主密钥，发送时可覆盖
        });

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session || !session.user) { location.href = 'login-messageschecker.html'; return; }
            const { data: checker } = await supabase.from('checkers').select('*').eq('user_id', session.user.id).maybeSingle();
            if (!checker) { location.href = 'login-messageschecker.html'; return; }
            currentChecker = checker;
            loadList();
        }

        async function loadList() {
            const container = document.getElementById('list');
            container.innerHTML = '<div class="empty">加载中...</div>';
            const { data, error } = await supabase.from('messages').select('*').eq('flag', 0).order('created_at', { ascending: false });
            if (error) { container.innerHTML = '<div class="empty">加载失败</div>'; return; }
            if (!data.length) { container.innerHTML = '<div class="empty">暂无待审核留言</div>'; return; }
            let html = '';
            for (const msg of data) {
                const time = new Date(msg.created_at).toLocaleString('zh-CN');
                let imageHtml = '';
                if (msg.pic_url && msg.pic_url.length > 0) {
                    imageHtml = '<div class="message-images">';
                    for (const url of msg.pic_url) {
                        imageHtml += `<img src="${escapeHtml(url)}" class="message-image" onclick="window.open(this.src)">`;
                    }
                    imageHtml += '</div>';
                }
                html += `
                    <div class="item">
                        <div class="item-header">
                            <span class="item-user">${escapeHtml(msg.username)}</span>
                            <span class="item-time">${time}</span>
                        </div>
                        <div class="item-content">${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>
                        ${imageHtml}
                        <div class="item-email">📧 ${escapeHtml(msg.contact_email || '未填写')}</div>
                        <div class="item-actions">
                            <button class="btn-approve" onclick="approveMsg('${msg.id}')">通过</button>
                            <button class="btn-reject" onclick="openRejectModal('${msg.id}')">拒绝</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text || ''; return div.innerHTML; }

        async function approveMsg(id) {
            const { error } = await supabase.from('messages').update({ flag: 1 }).eq('id', id);
            if (error) { alert('操作失败'); return; }
            loadList();
        }

        function openRejectModal(id) {
            pendingRejectId = id;
            document.getElementById('rejectReason').value = '';
            document.getElementById('rejectModal').style.display = 'flex';
        }

        function closeRejectModal() {
            pendingRejectId = null;
            document.getElementById('rejectModal').style.display = 'none';
        }

        document.getElementById('confirmRejectBtn').addEventListener('click', async function() {
    const reason = document.getElementById('rejectReason').value.trim();
    if (!reason) { alert('请填写拒绝原因'); return; }
    
    // 【关键1】强制校验ID，为空直接提示
    if (!pendingRejectId) { alert('系统错误：未获取到留言ID'); return; }

    const btn = this;
    btn.disabled = true;
    btn.textContent = '处理中...';

    try {
        // 1. 查询留言（必执行）
        const { data: msg, error: queryErr } = await supabase.from('messages').select('*').eq('id', pendingRejectId).single();
        if (queryErr || !msg) { alert('未找到该留言'); throw queryErr; }

        // 2. 更新数据库状态（拒绝）
        const { error: updateErr } = await supabase.from('messages').update({ 
            flag: 2, 
            reject_reason: reason 
        }).eq('id', pendingRejectId);
        if (updateErr) { alert('更新状态失败'); throw updateErr; }

        // 3. 发送邮件给用户（极简正确写法，无任何多余参数）
        await emailjs.send("service_o9y08vb", "template_reject_notify", {
            action: '未通过',
            reason: reason,
            content: msg.content,
            to: msg.contact_email
        }, MAIN_PUBLIC_KEY);

        // 4. 发送邮件给管理员
        await emailjs.send("service_9pshvlz", "template_reject_admin", {
            action: '未通过',
            reason: reason,
            reject_reason: reason,
            content: msg.content,
            to: msg.contact_email,
            checker_name: currentChecker.username,
            checker_email: currentChecker.email
        }, SUB_PUBLIC_KEY);

        alert('操作成功！');
        closeRejectModal();
        loadList();

    } catch (err) {
        // 【关键2】打印错误，告诉你哪里失败
        console.error('执行失败：', err);
        alert('执行失败：' + (err.message || '未知错误'));
    } finally {
        // 无论如何恢复按钮
        btn.disabled = false;
        btn.textContent = '确认拒绝';
    }
});

        async function doLogout() {
            await supabase.auth.signOut();
            location.href = 'login-messageschecker.html';
        }

        document.getElementById('menuToggle').onclick = function() {
            document.getElementById('navList').classList.toggle('show');
        };

        window.onload = checkAuth;
    </script>
</body>
</html>
