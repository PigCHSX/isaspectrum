<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ISA Spectrum</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
        .nav{background:#fff;padding:22px 0;text-align:center;box-shadow:0 2px 10px #00000007;}
        .nav a{margin:0 14px;font-size:16px;color:#222;text-decoration:none;padding:8px 10px}
        .nav a.active{color:#007bff;font-weight:600}
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin: 40px auto; text-align: center; }
        .login-box h2 { margin-bottom: 25px; color: #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .login-btn { width: 100%; padding: 12px; background: #409eff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .login-btn:hover { background: #337ecc; }
        .link-group { margin-top: 15px; }
        .link-group a { display: block; color: #409eff; text-decoration: none; margin: 8px 0; font-size: 14px; }
        .link-group a:hover { text-decoration: underline; }
        .footer-info { margin-top: auto; padding: 20px; font-size: 12px; color: #666; text-align: center; }
    </style>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ISA Spectrum" />
    <link rel="manifest" href="/images/site.webmanifest" />
</head>
<body>
<div class="login-box">
    <h2>登录</h2>
    <input id="email" type="email" placeholder="邮箱">
    <input id="password" type="password" placeholder="密码">
    <button class="login-btn" id="loginBtn">登录</button>
    <div class="link-group">
        <a href="forgot-password.html">找回密码</a>
        <a href="register.html">注册账号</a>
        <a href="main.html">返回首页</a>
    </div>
</div>
<script>
const SUPABASE_URL = 'https://bbcnrsktqarvceekrswb.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_f3Kav8ipJco_f9tw5zO50A_w7KigE5D';
window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function checkLoginStatus() {
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    if (session) location.href = 'messages.html';
}
window.onload = checkLoginStatus;

async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { alert('请填写邮箱和密码！'); return; }
    try {
        const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const username = data.user.user_metadata.username || data.user.email.split('@')[0];
        localStorage.setItem('sb_username', username);
        alert('登录成功！');
        location.href = 'messages.html';
    } catch (err) {
        let errorMsg = '登录失败：';
        if (err.message.includes('Invalid login credentials')) errorMsg += '邮箱或密码错误';
        else if (err.message.includes('Email not confirmed')) errorMsg += '邮箱未验证，请先激活';
        else errorMsg += err.message;
        alert(errorMsg);
    }
}
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.addEventListener('keydown', e => e.key === 'Enter' && doLogin());
</script>
</body>
</html>
